<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>2D Ball Sim</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        <link rel="manifest" href="/site.webmanifest">

      <script type="module" crossorigin src="/assets/main-B71dtrmQ.js"></script>
      <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-CH3kC-M2.js">
    </head>

    <body>
        <canvas id="2dcanvas" style="border: 2px solid;"></canvas>
        
        <div style="display: flex;">
            <div class="slidecontainer" style="padding: 10px;">
            <p>Gravity: <span id="gtext">10.0</span> m/s2</p>
            <input type="range" min="1" max="100" value="10" class="slider" id="gRange">
            </div>

            <div class="slidecontainer" style="padding: 10px;">
            <p>Restitution: <span id="restText">0.5</span></p>
            <input type="range" min="0" max="1" step="0.01" value="0.5" class="slider" id="restRange">
            </div>
            
            <button style="margin: 20px;" id="addbtn">Add Ball</button>
            <button style="margin: 20px;" id ="removebtn">Remove Ball</button>
            <button style="margin: 20px;" onclick="window.location.reload();">Restart Sim</button>
            <button id='3ddirect' style="margin: 20px;">3D Physics Engine</button>
        </div>

    </body>
</html>
